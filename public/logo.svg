<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#0a0a0a" stroke="#a3e635" stroke-width="4"/>

  <!-- Chad face - stylized C shape -->
  <text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle"
    font-family="Arial Black, sans-serif" font-weight="900" font-size="100"
    fill="#a3e635">C</text>

  <!-- Sunglasses left lens -->
  <rect x="38" y="88" width="44" height="22" rx="8" fill="#a3e635"/>
  <!-- Sunglasses right lens -->
  <rect x="90" y="88" width="44" height="22" rx="8" fill="#a3e635"/>
  <!-- Bridge -->
  <rect x="82" y="94" width="8" height="8" rx="2" fill="#a3e635"/>
  <!-- Left arm -->
  <rect x="20" y="94" width="18" height="6" rx="3" fill="#a3e635"/>
  <!-- Right arm -->
  <rect x="134" y="94" width="18" height="6" rx="3" fill="#a3e635"/>

  <!-- Subtle shine on glasses -->
  <rect x="44" y="91" width="12" height="6" rx="3" fill="white" opacity="0.25"/>
  <rect x="96" y="91" width="12" height="6" rx="3" fill="white" opacity="0.25"/>
</svg>
